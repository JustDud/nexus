name: Ingestion Daily

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_PROVIDER: ${{ secrets.EMBEDDING_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "from ingestion.db import apply_migrations; print(apply_migrations())"

      - name: Seed sources
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_PROVIDER: ${{ secrets.EMBEDDING_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "from ingestion.sources import seed_default_sources; print(seed_default_sources())"

      - name: Run ingestion batch
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_PROVIDER: ${{ secrets.EMBEDDING_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_ingestion_batch.py
